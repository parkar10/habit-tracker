<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monthly Habit Tracker — Skillsvault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <!-- PDF export libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --surface: #0d0d0d;
      --surface2: #1a1a1a;
      --border: #1e3a5f;
      --border-strong: #1e3a8a;
      --accent: #2563eb;
      --accent2: #1e3a8a;
      --green: #eab308;
      --green-light: rgba(234,179,8,0.15);
      --yellow: #eab308;
      --red: #eab308;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --week1: #0a0a0a;
      --week2: #0c0c1a;
      --week3: #0a0a0a;
      --week4: #0c0c0a;
      --header-h: 64px;
    }
    [data-theme="light"] {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --surface2: #f0f2f8;
      --border: #d1d5db;
      --border-strong: #b0b8d0;
      --accent: #2563eb;
      --accent2: #6366f1;
      --green: #16a34a;
      --green-light: rgba(22,163,74,0.12);
      --yellow: #ca8a04;
      --red: #dc2626;
      --text: #1e293b;
      --muted: #64748b;
      --week1: #f0f2f8;
      --week2: #e8ebf5;
      --week3: #f0f2f8;
      --week4: #f5f7fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--surface);
      backdrop-filter: none;
      border-bottom: 2px solid var(--border);
      box-shadow: 0 2px 12px rgba(37,99,235,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .brand-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -0.3px; color: var(--text); }
    .brand-text span { color: var(--accent); }

    .header-controls {
      display: flex; align-items: center; gap: 12px;
    }

    .month-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 6px 14px;
    }
    .month-selector select {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }
    .month-selector select option { background: #ffffff; color: var(--text); }

    .year-selector {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 6px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      width: 90px;
    }
    .year-selector option { background: #ffffff; color: var(--text); }

    .btn {
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-primary {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid rgba(234,179,8,.3);
    }
    .btn-primary:hover { background: rgba(234,179,8,.25); transform: translateY(-1px); }

    .btn-ghost {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid rgba(234,179,8,.3);
    }
    .btn-ghost:hover { background: rgba(234,179,8,.25); }

    /* Theme toggle */
    .theme-toggle {
      width: 44px; height: 24px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      position: relative;
      transition: all .2s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--yellow);
      position: absolute;
      top: 2px; left: 2px;
      transition: left .2s, background .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    [data-theme="light"] .theme-toggle::after {
      left: 22px;
      background: var(--accent);
    }

    /* ── STATS ROW ── */
    .stats-bar {
      display: flex;
      gap: 14px;
      padding: 20px 28px 0;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      min-width: 130px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: all .2s;
      box-shadow: 0 2px 8px rgba(79,70,229,0.06);
    }
    .stat-card:hover { border-color: var(--accent); box-shadow: 0 4px 18px rgba(79,70,229,0.14); transform: translateY(-1px); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
    .stat-value { font-size: 26px; font-weight: 800; font-family: 'Outfit', sans-serif; }
    .stat-value.green { color: var(--green); }
    .stat-value.purple { color: var(--accent2); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--muted); }

    /* ── MAIN TRACKER ── */
    .tracker-wrapper {
      padding: 20px 28px 40px;
      overflow-x: auto;
    }

    .tracker-card {
      background: var(--surface);
      border: 2px solid var(--border-strong);
      border-radius: 18px;
      overflow: hidden;
      min-width: 900px;
      box-shadow: 0 4px 24px rgba(79,70,229,0.10);
    }

    /* Habits panel header */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 2px solid var(--border);
      background: linear-gradient(90deg, var(--surface), var(--surface2));
    }
    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
    }
    .add-habit-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--green-light);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 8px;
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .18s;
    }
    .add-habit-btn:hover { background: rgba(34,197,94,.25); }

    /* Grid layout */
    .tracker-grid {
      display: grid;
      grid-template-columns: 260px 70px 1fr;
    }

    /* Fixed left columns */
    .col-habits, .col-goals {
      border-right: 1px solid var(--border);
    }

    /* Column headers */
    .col-header {
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .9px;
      color: var(--accent);
      padding: 10px 6px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: var(--header-h);
    }
    .col-header.left { justify-content: flex-start; padding-left: 16px; }

    /* Week and day headers */
    .days-area {
      overflow: hidden;
    }
    .weeks-row {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
    }
    .week-block {
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--border-strong);
    }
    .week-block:last-child { border-right: none; }
    .week-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-align: center;
      padding: 5px 0 2px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }
    .days-row { display: flex; }
    .day-cell {
      width: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3px 0;
      gap: 1px;
    }
    .day-name { font-size: 9px; color: var(--muted); font-weight: 600; }
    .day-num { font-size: 11px; font-weight: 700; color: var(--text); }
    .day-cell.today .day-num {
      background: var(--yellow);
      color: #000;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: grid; place-items: center;
    }
    .day-cell.weekend .day-num { color: var(--accent2); font-weight: 800; }

    /* Habit rows */
    .habit-row {
      display: contents;
    }
    .habit-row > * {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .habit-row:hover > * { background: var(--surface2); }

    .habit-name-cell {
      display: flex; align-items: center;
      padding: 0 12px 0 8px;
      gap: 6px;
      min-height: 44px;
      cursor: pointer;
    }
    .habit-num { font-size: 11px; color: var(--muted); min-width: 18px; text-align: right; font-weight: 700; }
    .habit-emoji { font-size: 16px; }
    .habit-name { font-size: 13px; font-weight: 500; }
    .habit-name-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      width: 100%;
    }
    .delete-habit-btn {
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity .15s, background .15s;
    }
    .habit-row:hover .delete-habit-btn { opacity: 1; }
    .delete-habit-btn:hover { background: rgba(239,68,68,.15); }

    .goal-cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 44px;
      font-size: 13px; font-weight: 700; color: var(--accent);
    }
    .goal-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      width: 50px;
      text-align: center;
    }

    /* Checkboxes area */
    .checks-row {
      display: flex;
      min-height: 44px;
      align-items: center;
    }
    .week-checks {
      display: flex;
      border-right: 2px solid var(--border-strong);
    }
    .week-checks:last-child { border-right: none; }

    /* Custom checkbox */
    .check-wrap {
      width: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .check-wrap input[type=checkbox] { display: none; }
    .check-box {
      width: 22px; height: 22px;
      border: 2px solid var(--border-strong);
      border-radius: 5px;
      display: grid; place-items: center;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      background: var(--bg);
    }
    .check-box:hover { border-color: var(--yellow); background: var(--surface2); }
    .check-box.checked {
      background: linear-gradient(135deg, #eab308, #facc15);
      border-color: #eab308;
      box-shadow: 0 2px 8px rgba(234,179,8,.4);
    }
    .check-box.checked::after {
      content: '';
      width: 10px; height: 6px;
      border-left: 2.5px solid #fff;
      border-bottom: 2.5px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }
    .check-box.missed {
      background: rgba(234,179,8,.1);
      border-color: rgba(234,179,8,.5);
    }
    .check-box.missed::after {
      content: '✕';
      font-size: 10px;
      color: var(--red);
      font-weight: 700;
    }
    .check-box.future { opacity: .4; pointer-events: none; background: var(--surface2); }

    /* Progress bar per habit */
    .habit-progress {
      height: 4px;
      background: var(--border);
      margin: 0;
    }
    .habit-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #eab308, #facc15);
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* Summary row */
    .summary-row {
      background: var(--surface);
      border-top: 2px solid var(--border-strong);
    }
    .summary-label {
      display: flex; align-items: center;
      padding: 0 12px;
      font-size: 12px; font-weight: 700;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: .7px;
      min-height: 36px;
    }
    .summary-goal { display: flex; align-items: center; justify-content: center; min-height: 36px; }
    .summary-checks {
      display: flex;
      min-height: 36px;
      align-items: center;
    }
    .week-summary { display: flex; border-right: 2px solid var(--border-strong); }
    .week-summary:last-child { border-right: none; }
    .day-summary {
      width: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .day-count {
      font-size: 11px; font-weight: 700;
      width: 22px; height: 22px;
      border-radius: 6px;
      display: grid; place-items: center;
    }
    .day-count.all { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
    .day-count.some { background: rgba(234,179,8,0.12); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
    .day-count.none { color: var(--muted); }

    /* Month tabs */
    .month-tabs {
      display: flex;
      padding: 0 28px;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      background: var(--surface);
    }
    .month-tab {
      padding: 10px 16px;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: all .15s;
      margin-bottom: -2px;
    }
    .month-tab:hover { color: var(--accent); }
    .month-tab.active { color: var(--accent); border-color: var(--accent); font-weight: 700; }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      z-index: 200;
      place-items: center;
    }
    .modal-overlay.open { display: grid; }
    .modal {
      background: var(--surface);
      border: 2px solid var(--border-strong);
      border-radius: 18px;
      padding: 28px;
      width: 400px;
      max-width: 95vw;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal h3 { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); background: var(--surface); }
    .emoji-picker {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .emoji-opt {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      background: var(--surface2);
      border: 2px solid var(--border);
      transition: all .15s;
    }
    .emoji-opt:hover, .emoji-opt.sel { border-color: var(--accent); background: var(--surface); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-left: 5px solid var(--green);
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      transform: translateX(120%);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 300;
    }
    .toast.show { transform: translateX(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* PDF export loading overlay */
    .pdf-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(8px);
      z-index: 500;
      place-items: center;
    }
    .pdf-overlay.active { display: grid; }
    .pdf-spinner {
      background: var(--surface);
      border: 2px solid var(--border-strong);
      border-radius: 18px;
      padding: 36px 48px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,.15);
    }
    .pdf-spinner .spin {
      width: 52px; height: 52px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-spinner p {
      font-size: 15px; font-weight: 600; color: var(--text);
    }
    .pdf-spinner small { font-size: 12px; color: var(--muted); }

    /* While capturing: flatten scrollable areas so full grid is visible */
    body.pdf-capturing .tracker-wrapper {
      overflow: visible !important;
    }
    body.pdf-capturing .days-area {
      overflow: visible !important;
    }
    body.pdf-capturing header,
    body.pdf-capturing .month-tabs,
    body.pdf-capturing .pdf-overlay {
      display: none !important;
    }
    body.pdf-capturing {
      background: var(--bg) !important;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="brand">
    <div class="brand-icon">📋</div>
    <div class="brand-text">Skills<span>vault</span> Habit Tracker</div>
  </div>
  <div class="header-controls">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"></button>
    <div class="month-selector">
      <span style="font-size:13px">📅</span>
      <select id="monthSelect"></select>
    </div>
    <select id="yearSelect" class="year-selector"></select>
    <button class="btn btn-primary" onclick="openAddModal()">＋ Add Habit</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-primary" id="pdfBtn" onclick="exportPDF()">Export PDF</button>
  </div>
</header>

<!-- ── MONTH TABS ── -->
<div class="month-tabs" id="monthTabs"></div>

<!-- ── STATS ── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── TRACKER ── -->
<div class="tracker-wrapper">
  <div class="tracker-card">
    <div class="panel-header">
      <span class="panel-title">Daily Habits — <span id="panelMonthLabel"></span></span>
      <button class="add-habit-btn" onclick="openAddModal()">＋ Add Habit</button>
    </div>
    <div class="tracker-grid" id="trackerGrid"></div>
  </div>
</div>

<!-- ── ADD HABIT MODAL ── -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>✨ New Habit</h3>
    <div class="form-group">
      <label class="form-label">Habit Name</label>
      <input class="form-input" id="newHabitName" placeholder="e.g. Wake up at 5AM" />
    </div>
    <div class="form-group">
      <label class="form-label">Goal (days/month)</label>
      <input class="form-input" id="newHabitGoal" type="number" min="1" max="31" value="30" />
    </div>
    <div class="form-group">
      <label class="form-label">Pick an Emoji</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addHabit()">Add Habit</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── PDF LOADING OVERLAY ── -->
<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner">
    <div class="spin"></div>
    <p>Generating PDF…</p>
    <small>Capturing your habit tracker at full resolution</small>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'sv_habit_tracker_v2';
let state = loadState();

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DAY_ABBR    = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const EMOJIS      = ['🌅','💧','🧘','💪','🥗','📚','🚶','🎯','✍️','🎵',
                     '🖥️','🌿','😴','❤️','🔥','⭐','🧠','🏊','🚴','🌙'];

let selectedEmoji = '🎯';

// ─── INIT ─────────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  const now = new Date();
  return {
    month: now.getMonth(),
    year:  now.getFullYear(),
    habits: [
      { id: uid(), name: 'Wake up at 5AM',          emoji: '🌅', goal: 30 },
      { id: uid(), name: 'Drink 5L Water',           emoji: '💧', goal: 30 },
      { id: uid(), name: 'Meditation',               emoji: '🧘', goal: 30 },
      { id: uid(), name: 'Workout',                  emoji: '💪', goal: 30 },
      { id: uid(), name: 'Stop sugar intake & sweets',emoji:'🥗', goal: 30 },
      { id: uid(), name: 'Read a book daily',        emoji: '📚', goal: 30 },
      { id: uid(), name: 'Walk 10k steps daily',     emoji: '🚶', goal: 30 },
      { id: uid(), name: 'Work on upskilling',       emoji: '🎯', goal: 15 },
      { id: uid(), name: 'Reduce social media time', emoji: '📵', goal: 30 },
    ],
    checks: {}   // "habitId-YYYY-MM-DD" -> true/false
  };
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function uid() { return Math.random().toString(36).slice(2,9); }

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function checkKey(habitId, d) {
  const mm = String(state.month+1).padStart(2,'0');
  const dd = String(d).padStart(2,'0');
  return `${habitId}-${state.year}-${mm}-${dd}`;
}
function isToday(d) {
  const now = new Date();
  return now.getFullYear()===state.year && now.getMonth()===state.month && now.getDate()===d;
}
function isFuture(d) {
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(state.year, state.month, d);
  return target > now;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderMonthTabs();
  renderSelects();
  renderGrid();
  renderStats();
  document.getElementById('panelMonthLabel').textContent =
    `${MONTH_NAMES[state.month]} ${state.year}`;
}

function renderMonthTabs() {
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = MONTH_NAMES.map((m,i) =>
    `<div class="month-tab ${i===state.month?'active':''}"
          onclick="switchMonth(${i})">${m.slice(0,3)}</div>`
  ).join('');
}

function renderSelects() {
  const ms = document.getElementById('monthSelect');
  const ys = document.getElementById('yearSelect');
  ms.innerHTML = MONTH_NAMES.map((m,i) =>
    `<option value="${i}" ${i===state.month?'selected':''}>${m}</option>`).join('');
  const curY = new Date().getFullYear();
  ys.innerHTML = [curY-1, curY, curY+1].map(y =>
    `<option value="${y}" ${y===state.year?'selected':''}>${y}</option>`).join('');
  ms.onchange = () => { state.month = +ms.value; saveState(); render(); };
  ys.onchange = () => { state.year  = +ys.value; saveState(); render(); };
}

function renderGrid() {
  const grid  = document.getElementById('trackerGrid');
  const days  = daysInMonth(state.year, state.month);
  const firstDow = new Date(state.year, state.month, 1).getDay();

  // Build week groups: week 1 = days 1-7, week 2 = 8-14, etc.
  const weeks = [];
  for (let d = 1; d <= days; d += 7) {
    weeks.push({ label: `Week ${weeks.length+1}`, days: [] });
    for (let x = d; x < d+7 && x <= days; x++) {
      const dow = new Date(state.year, state.month, x).getDay();
      weeks[weeks.length-1].days.push({ d: x, dow });
    }
  }

  const weekBgColors = ['var(--week1)','var(--week2)','var(--week3)','var(--week4)'];

  // Column headers (left pane)
  const leftHeader = `
    <div class="col-header left col-habits" style="border-right:1px solid var(--border)">Daily Habits</div>
    <div class="col-header col-goals" style="border-right:1px solid var(--border)">Goals</div>
  `;

  // Days header (right pane)
  const daysHeader = `
    <div class="days-area" style="border-bottom:1px solid var(--border)">
      <div class="weeks-row">
        ${weeks.map((w,wi) => `
          <div class="week-block" style="background:${weekBgColors[wi%4]}">
            <div class="week-label">${w.label}</div>
            <div class="days-row">
              ${w.days.map(({d,dow}) => `
                <div class="day-cell ${isToday(d)?'today':''} ${dow===0||dow===6?'weekend':''}">
                  <span class="day-name">${DAY_ABBR[dow]}</span>
                  <span class="day-num">${d}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Habit rows
  const habitRows = state.habits.map((h,idx) => {
    const rowChecks = weeks.map((w,wi) => {
      const boxes = w.days.map(({d}) => {
        const key = checkKey(h.id, d);
        const checked = !!state.checks[key];
        const fut = isFuture(d);
        let cls = fut ? 'future' : checked ? 'checked' : '';
        return `
          <div class="check-wrap">
            <div class="check-box ${cls}" onclick="toggle('${h.id}',${d})" title="Day ${d}"></div>
          </div>`;
      }).join('');
      return `<div class="week-checks" style="background:${weekBgColors[wi%4]}">${boxes}</div>`;
    }).join('');

    // Progress
    const total = Object.keys(state.checks).filter(k => k.startsWith(h.id+'-') && state.checks[k]).length;
    const pct = Math.min(100, Math.round(total / (h.goal||30) * 100));

    return `
      <div class="habit-row">
        <div class="col-habits" style="border-right:1px solid var(--border)">
          <div class="habit-name-cell">
            <span class="habit-num">${idx+1}</span>
            <span class="habit-emoji">${h.emoji}</span>
            <input class="habit-name-input" value="${h.name}"
                   onchange="renameHabit('${h.id}',this.value)" />
            <button class="delete-habit-btn" onclick="deleteHabit('${h.id}')" title="Delete">✕</button>
          </div>
          <div class="habit-progress"><div class="habit-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="col-goals" style="border-right:1px solid var(--border)">
          <div class="goal-cell">
            <input class="goal-input" type="number" value="${h.goal}"
                   onchange="updateGoal('${h.id}',this.value)" min="1" max="31"/>
          </div>
        </div>
        <div class="days-area">
          <div class="checks-row">${rowChecks}</div>
        </div>
      </div>
    `;
  }).join('');

  // Summary row
  const summaryChecks = weeks.map((w,wi) => {
    const cells = w.days.map(({d}) => {
      const checked = state.habits.filter(h => !!state.checks[checkKey(h.id,d)]).length;
      const total   = state.habits.length;
      const cls = checked===0 ? 'none' : checked===total ? 'all' : 'some';
      const label = checked > 0 ? checked : '—';
      return `<div class="day-summary"><div class="day-count ${cls}">${label}</div></div>`;
    }).join('');
    return `<div class="week-summary" style="background:${weekBgColors[wi%4]}">${cells}</div>`;
  }).join('');

  grid.innerHTML = `
    ${leftHeader}
    ${daysHeader}
    ${habitRows}
    <div class="summary-row col-habits" style="border-right:1px solid var(--border)">
      <div class="summary-label">Day Totals</div>
    </div>
    <div class="summary-row col-goals" style="border-right:1px solid var(--border)">
      <div class="summary-goal"></div>
    </div>
    <div class="summary-row days-area">
      <div class="summary-checks">${summaryChecks}</div>
    </div>
  `;
}

function renderStats() {
  const days = daysInMonth(state.year, state.month);
  const now = new Date();
  const isCurrentMonth = now.getFullYear()===state.year && now.getMonth()===state.month;
  const daysSoFar = isCurrentMonth ? now.getDate() : days;

  const totalPossible = state.habits.length * daysSoFar;
  let totalChecked = 0;
  state.habits.forEach(h => {
    for (let d = 1; d <= daysSoFar; d++) {
      if (state.checks[checkKey(h.id,d)]) totalChecked++;
    }
  });

  const rate = totalPossible ? Math.round(totalChecked/totalPossible*100) : 0;

  // Best streak
  let bestStreak = 0, cur = 0;
  for (let d = 1; d <= daysSoFar; d++) {
    const allDone = state.habits.every(h => !!state.checks[checkKey(h.id,d)]);
    if (allDone && state.habits.length>0) { cur++; bestStreak = Math.max(bestStreak, cur); }
    else cur = 0;
  }

  // Current streak (from today backwards)
  let streak = 0;
  for (let d = daysSoFar; d >= 1; d--) {
    if (state.habits.length===0) break;
    const done = state.habits.filter(h => !!state.checks[checkKey(h.id,d)]).length;
    if (done > 0) { streak++; } else break;
  }

  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Completion Rate</div>
      <div class="stat-value ${rate>=80?'green':rate>=50?'yellow':'red'}">${rate}%</div>
      <div class="stat-sub">${totalChecked} of ${totalPossible} checks</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Habits</div>
      <div class="stat-value purple">${state.habits.length}</div>
      <div class="stat-sub">Active this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current Streak</div>
      <div class="stat-value ${streak>=7?'green':streak>=3?'yellow':'red'}">🔥 ${streak}</div>
      <div class="stat-sub">Consecutive days active</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Perfect Day</div>
      <div class="stat-value green">⭐ ${bestStreak}</div>
      <div class="stat-sub">All habits done</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Days Tracked</div>
      <div class="stat-value purple">${daysSoFar}</div>
      <div class="stat-sub">of ${days} days</div>
    </div>
  `;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggle(habitId, day) {
  const key = checkKey(habitId, day);
  state.checks[key] = !state.checks[key];
  saveState();
  render();
  if (state.checks[key]) showToast('✅ Habit checked!');
}

function switchMonth(m) {
  state.month = m;
  saveState();
  render();
}

function renameHabit(id, name) {
  const h = state.habits.find(x => x.id===id);
  if (h) { h.name = name; saveState(); }
}

function updateGoal(id, val) {
  const h = state.habits.find(x => x.id===id);
  if (h) { h.goal = +val||30; saveState(); renderStats(); }
}

function deleteHabit(id) {
  if (!confirm('Delete this habit?')) return;
  state.habits = state.habits.filter(x => x.id!==id);
  Object.keys(state.checks).forEach(k => { if (k.startsWith(id+'-')) delete state.checks[k]; });
  saveState(); render();
  showToast('🗑 Habit deleted');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('newHabitName').value = '';
  document.getElementById('newHabitGoal').value = '30';
  buildEmojiPicker();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newHabitName').focus(), 100);
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

function buildEmojiPicker() {
  selectedEmoji = '🎯';
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'sel':''}" onclick="selectEmoji(this,'${e}')">${e}</div>`
  ).join('');
}

function selectEmoji(el, e) {
  document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('sel'));
  el.classList.add('sel');
  selectedEmoji = e;
}

function addHabit() {
  const name = document.getElementById('newHabitName').value.trim();
  const goal = +document.getElementById('newHabitGoal').value || 30;
  if (!name) { document.getElementById('newHabitName').focus(); return; }
  state.habits.push({ id: uid(), name, emoji: selectedEmoji, goal });
  saveState();
  closeModal();
  render();
  showToast('🎉 Habit added!');
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const days = daysInMonth(state.year, state.month);
  const header = ['Habit', 'Goal', ...Array.from({length:days},(_,i)=>i+1)].join(',');
  const rows = state.habits.map(h => {
    const cells = Array.from({length:days},(_,i)=>state.checks[checkKey(h.id,i+1)]?'✓':'');
    return [`"${h.name}"`, h.goal, ...cells].join(',');
  });
  const csv = [header, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `habit-tracker-${MONTH_NAMES[state.month]}-${state.year}.csv`;
  a.click();
  showToast('📥 CSV exported!');
}

// ─── EXPORT PDF ──────────────────────────────────────────────────────────────
async function exportPDF() {
  const overlay = document.getElementById('pdfOverlay');
  const btn     = document.getElementById('pdfBtn');
  overlay.classList.add('active');
  btn.disabled = true;

  // Give browser a frame to show overlay before heavy work
  await new Promise(r => requestAnimationFrame(() => setTimeout(r, 60)));

  // Temporarily expand overflowing areas so html2canvas captures everything
  document.body.classList.add('pdf-capturing');

  // Force-expand tracker-card to its full natural width
  const trackerCard = document.querySelector('.tracker-card');
  const origMinWidth = trackerCard.style.minWidth;
  trackerCard.style.minWidth = 'none';

  try {
    const target = document.getElementById('trackerGrid').closest('.tracker-card').parentElement;
    // Capture with extra scale for sharpness
    const canvas = await html2canvas(document.body, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0f1117',
      scrollX: 0,
      scrollY: 0,
      windowWidth: document.body.scrollWidth,
      windowHeight: document.body.scrollHeight,
      logging: false,
    });

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;

    // A4 landscape in mm
    const PAGE_W = 297;
    const PAGE_H = 210;
    const MARGIN = 6;
    const usableW = PAGE_W - MARGIN * 2;
    const usableH = PAGE_H - MARGIN * 2;

    // Image dimensions in mm (keeping aspect)
    const imgW_px = canvas.width;
    const imgH_px = canvas.height;
    const ratio   = imgH_px / imgW_px;
    const imgW_mm = usableW;
    const imgH_mm = imgW_mm * ratio;

    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

    // Paginate vertically
    let yOffset = 0;
    let pageIdx  = 0;
    while (yOffset < imgH_mm) {
      if (pageIdx > 0) pdf.addPage();
      // Clip: draw full-width image shifted up by yOffset so the right slice shows
      pdf.addImage(imgData, 'PNG', MARGIN, MARGIN - yOffset, imgW_mm, imgH_mm);
      // White mask above current page content (top)
      if (yOffset > 0) {
        pdf.setFillColor(15, 17, 23);
        pdf.rect(0, 0, PAGE_W, MARGIN, 'F');
      }
      // Bottom mask
      pdf.setFillColor(15, 17, 23);
      pdf.rect(0, MARGIN + usableH, PAGE_W, MARGIN + 1, 'F');

      // Footer
      pdf.setFont('helvetica','normal');
      pdf.setFontSize(8);
      pdf.setTextColor(100, 116, 139);
      pdf.text(
        `Skillsvault Habit Tracker — ${MONTH_NAMES[state.month]} ${state.year}  |  Page ${pageIdx+1}`,
        MARGIN, PAGE_H - 2
      );

      yOffset += usableH;
      pageIdx++;
    }

    pdf.save(`habit-tracker-${MONTH_NAMES[state.month]}-${state.year}.pdf`);
    showToast('📄 PDF downloaded!');
  } catch (err) {
    console.error(err);
    showToast('❌ PDF export failed');
  } finally {
    document.body.classList.remove('pdf-capturing');
    trackerCard.style.minWidth = origMinWidth;
    overlay.classList.remove('active');
    btn.disabled = false;
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('addModal').classList.contains('open')) addHabit();
});
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target===e.currentTarget) closeModal();
});

// ─── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('sv_theme', next);
}

function initTheme() {
  const saved = localStorage.getItem('sv_theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
initTheme();
render();
</script>
</body>
